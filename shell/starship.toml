"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ оЬС ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#1a1b26 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 7
truncation_symbol = "вА¶/"
truncate_to_repo = false
repo_root_style = "fg:#1a1b26 bg:#769ff0 bold"
repo_root_format = "[ $before_root_path]($style)[$repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "оШИ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
